<html lang="en">
<head>

<body>
    <script>
        let prodictPrice = [500,2600,850,5000,6000];
        console.log(prodictPrice);
        
        let mapedPrices = prodictPrice.map((price)=>{
            return price-price/10;
            
        });
        console.log(mapedPrices);

        let fileteredProducts = mapedPrices.filter((price)=> {
            return price>=1000 && price<=5000;
        })
        console.log(fileteredProducts);

        let totalPrice = mapedPrices.reduce((price,total)=>{
            return price+total;
        },250)
        console.log(totalPrice);
        

    </script>
