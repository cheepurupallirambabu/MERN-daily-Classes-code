<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        fetch("./cources.json")

        }).catch((err)=>{console.log(err)
        })

    </script>
