<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>api Fetch</title>
</head>
<body>
    <script>
       let apiUrl = "https://api.github.com/users"

       fetch(apiUrl).then((res)=>res.json()).then((users)=>{
        users.forEach((user) => {
            console.log(user.login=="mojombo");
            
        });
       }).catch((err)=>{console.log(err);
       })

    </script>
</body>
</html>
