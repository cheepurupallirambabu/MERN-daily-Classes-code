<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Properties</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            border: 2px solid black;
            padding: 30px;
            border-radius: 10px;
        }
        input {
            width: 400px;
            padding: 10px 5px;
            border: 1px solid black;
        }
        #button-container {
            display: grid;
             grid-template-columns: repeat(4, 1fr);
             margin-top: 30px;
             row-gap: 10px;
             column-gap: 10px;
             
        }
        #button-container div {
            border: 2px solid red;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
        }
        #button-container div:nth-child(16) {
            grid-column-start: 4;
            grid-row-start: 5;
            grid-row-end: 7;
            background-color: rgb(245, 61, 61);
            color: white;
        }
        #button-container div:nth-child(1) {
            grid-column-start: 1;
            grid-column-end: 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <input type="number" readonly placeholder="0">
        </div>
        <div id="button-container">
            <div>Sin</div>
            <div>Tan</div>
            <div>AC</div>

            <div>Cas</div>
            <div>def</div>
            <div>x<sup>2</sup></div>
            <div>%</div>

            <div>9</div>
            <div>8</div>
            <div>7</div>
            <div>*</div>
           
            <div>4</div>
            <div>5</div>
            <div>6</div>
            <div>-</div>

            <div>+</div>
            <div>2</div>
            <div>3</div>
            <div>1</div>

            <div>=</div>
            <div>0</div>
            <div>/</div>
            
        </div>
    </div>
</body>
</html>
