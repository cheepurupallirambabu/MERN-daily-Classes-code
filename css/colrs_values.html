<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        li:first-child {
            color: aqua;
            background-color: black;
        }
        li:nth-child(2){
            color: rgb(212,123,255);
            background-color: rgb(0,0,0);
        }
        li:nth-child(3){
           border :10px solid rgba(255,100,1,0.1);
        }

         li:nth-child(4){
           background-color: hsl(45deg,30%,60%);
        }

        li:nth-child(5){
           background-color: hsla(191, 43%, 74%, 0.6);
        }
    </style>
</head>
<body>
    <ol>
        <li>
            <h4>headings-1</h4>
        </li>
        <li>
            <h4>headings-2</h4>
        </li>
        <li>
            <h4>headings-3</h4>
        </li>
        <li>
            <h4>headings-4</h4>
        </li>
        <li>
            <h4>headings-5</h4>
        </li>
        <li>
            <h4>headings-6</h4>
        </li>
    </ol>
</body>
</html>
